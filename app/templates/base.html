<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}HRMS{% endblock %}</title>
    <link rel="icon" type="image/x-icon" href="{{ url_for('routes.favicon') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    {% block extra_css %}{% endblock %}
</head>
<body>
    {% block content %}{% endblock %}

    <!-- Change password modal (available on all pages) -->
    <div id="changePasswordModal" class="change-password-modal-overlay" style="display: none;">
        <div class="change-password-modal-dialog">
            <div class="change-password-modal-header">
                <h2 class="change-password-modal-title">Change password</h2>
                <button type="button" class="change-password-modal-close" id="changePasswordModalClose">&times;</button>
            </div>
            <form method="POST" action="{{ url_for('routes.change_password') }}" id="changePasswordForm">
                <div class="change-password-modal-body">
                    <div class="form-group">
                        <label for="current_password">Current password</label>
                        <input type="password" id="current_password" name="current_password" class="form-control" required autocomplete="current-password">
                    </div>
                    <div class="form-group">
                        <label for="new_password">New password</label>
                        <input type="password" id="new_password" name="new_password" class="form-control" required minlength="6" autocomplete="new-password">
                    </div>
                </div>
                <div class="change-password-modal-footer">
                    <button type="button" class="btn-secondary" id="changePasswordModalCancel">Cancel</button>
                    <button type="submit" class="btn-primary">Change password</button>
                </div>
            </form>
        </div>
    </div>
    <style>
    .change-password-modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 2000; display: flex; align-items: center; justify-content: center; padding: 1rem; }
    .change-password-modal-dialog { background: var(--white); border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.2); max-width: 420px; width: 100%; }
    .change-password-modal-header { display: flex; justify-content: space-between; align-items: center; padding: 1rem 1.5rem; border-bottom: 1px solid var(--light-gray); }
    .change-password-modal-title { font-size: 1.25rem; margin: 0; }
    .change-password-modal-close { background: none; border: none; font-size: 1.5rem; cursor: pointer; color: var(--medium-gray); line-height: 1; padding: 0 0.25rem; }
    .change-password-modal-body { padding: 1.5rem; }
    .change-password-modal-footer { display: flex; justify-content: flex-end; gap: 0.75rem; padding: 1rem 1.5rem; border-top: 1px solid var(--light-gray); }
    </style>
    <script>
    document.addEventListener('DOMContentLoaded', function() {
        var changePasswordModal = document.getElementById('changePasswordModal');
        if (!changePasswordModal) return;
        document.body.addEventListener('click', function(e) {
            if (e.target.closest && e.target.closest('.btn-change-password')) {
                changePasswordModal.style.display = 'flex';
                var cur = document.getElementById('current_password');
                var neu = document.getElementById('new_password');
                if (cur) cur.value = '';
                if (neu) neu.value = '';
            }
        });
        var closeBtn = document.getElementById('changePasswordModalClose');
        if (closeBtn) closeBtn.addEventListener('click', function() { changePasswordModal.style.display = 'none'; });
        var cancelBtn = document.getElementById('changePasswordModalCancel');
        if (cancelBtn) cancelBtn.addEventListener('click', function() { changePasswordModal.style.display = 'none'; });
        changePasswordModal.addEventListener('click', function(e) {
            if (e.target === changePasswordModal) changePasswordModal.style.display = 'none';
        });
    });
    </script>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
